<!DOCTYPE html>

<head>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            height:100vh;
            overflow:hidden;
            background:#000;
            position:relative;
        }

        /* 影片層 */
        #video-wrapper{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:1;
        }
        .video{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
            object-fit:cover;
            opacity:0;
            transition:opacity .6s ease;
            background:#000;
        }
        .video.active{opacity:1;}

        /* 互動層 */
        #overlay{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:10;
            opacity:0;
            transition:opacity .5s ease .3s;
            pointer-events:none;
        }
        #overlay.active{
            opacity:1;
            pointer-events:auto;
        }

         /* 雙層圓點 - 縮小版 */
        .info-dot {
            position: absolute;
            width: 28px; 
            height: 28px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        .info-dot::before {
            content: '';
            position: absolute;
            inset: -6px;
            background: radial-gradient(circle, rgb(255, 255, 255) 50%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 1.8s infinite ease-in-out;
            pointer-events: none;
            z-index: -1;
        }
        .info-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            background: transparent;
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            animation: pulse 1.8s infinite ease-in-out;
            transition: all 0.3s ease;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.65; }
            50%      { transform: scale(1.4); opacity: 0.95; }
        }
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.45; }
            50%      { transform: scale(1.45); opacity: 0.75; }
        }

        .info-dot.triggered::after {
            background: white !important;
            border-color: white !important;
            animation: none !important;
            transform: scale(1) !important;
            opacity: 1 !important;
            box-shadow: 0 0 16px rgba(255,255,255,0.85);
        }
        .info-dot.triggered::before {
            animation: none !important;
            opacity: 0.85;
            transform: scale(1.08) !important;
        }
        .info-dot.triggered {
            pointer-events: none !important;
            cursor: default !important;
            opacity: 1 !important;
        }

        .info-dot:hover:not(.triggered) {
            transform: scale(1.4) !important;
            opacity: 1;
        }

        .dot-1{top:80%;left:15%;}
        .dot-2{top:60%;left:70%;}
        .dot-3{top:30%;left:20%;}

          /* 資訊卡 - 左右並排布局：左圖右文字 + 標題 */
.info-card {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    width: 90%;
    max-width: 900px;              /* 稍微加寬一點，讓左右並排更舒適 */
    max-height: 400px;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    z-index: 20;
    overflow: visible;
}

.info-card.show {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
}

.info-card .card-content {
    position: relative;
    background: rgba(180, 190, 200, 0.85);
    padding: 30px;
    border-radius: 24px;
    display: flex;                 /* 改成 flex 左右並排 */
    flex-direction: row;
    gap: 30px;                     /* 圖文間距 */
    align-items: flex-start;
    height: auto;
}

/* 左側圖片區 */
.card-image-container {
    flex: 0 0 45%;                 /* 圖片佔 45% 寬度，可調 40%~50% */
    max-width: 400px;
}

.card-image {
    width: 100%;
    border-radius: 16px;
    display: block;
}

/* 右側文字區 */
.card-text-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.card-title {
    font-size: 32px;               /* 標題大小 */
    font-weight: bold;
    color: #222;
    margin-bottom: 20px;
    text-align: center;            /* 或改 left 左對齊 */
    line-height: 1.3;
}

.card-text {
    line-height: 1.7;
    font-size: 1.05em;
    color: #333;
}

.card-text p {
    margin-bottom: 18px;
}

        /* === info1 特殊左右布局 - 完全不產生滾輪條版 === */
#info1.special-layout .card-content {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 30px;                       /* 再減小一點間距 */
    text-align: left;
    padding: 30px 25px;              /* 減小 padding，釋放更多空間 */
    width: 100%;
    max-width: none;
    height: auto;                    /* 完全自動高度 */
    min-height: unset;               /* 移除 min-height 限制 */
    max-height: 92vh;                /* 卡片整體不超過螢幕高度 */
    overflow: hidden;                /* 關鍵！強制隱藏任何溢出內容，避免滾輪 */
    box-sizing: border-box;
}

/* 右側區域 */
#info1 .right-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    max-width: 55%;
    margin: 0;
}

/* 圖片疊加區 - 嚴格限制高度，避免撐開卡片 */
#info1 .right-section .image-stack {
    position: relative;
    width: 100%;
    max-width: 480px;
    max-height: 520px;               /* 嚴格限高，超過就縮小或裁切 */
    aspect-ratio: 3 / 4;
    margin: 0 auto 20px auto;
    overflow: hidden;                /* 防止圖片溢出造成滾輪 */
}

/* 底圖 - 強制適應容器高度 */
#info1 .right-section .base-image {
    width: 100%;
    height: 100%;                    /* 填滿容器 */
    max-height: 520px;
    object-fit: contain;             /* 保持比例不變形 */
    display: block;
    border-radius: 20px;
}

/* 疊加圖 - 相對大小 */
#info1 .right-section .overlay-image {
    position: absolute;
    width: 20%;
    height: auto;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
}

#info1 .right-section .overlay-image.temp-male {
    top: 28%;
    left: 28%;
}

#info1 .right-section .overlay-image.temp-female {
    bottom: 58%;
    right: 12%;
}

/* 手機/小螢幕：上下排列 + 更嚴格限高 */
@media (max-width: 1024px) {
    #info1.special-layout .card-content {
        flex-direction: column;
        gap: 25px;
        padding: 25px 20px;
        overflow: hidden;
    }
    
    #info1 .right-section {
        max-width: 100%;
    }
    
    #info1 .right-section .image-stack {
        max-width: 100%;
        max-height: 420px;           /* 手機再壓低高度 */
    }
}

        /* 滾輪選單 - 等比例縮小 */
        #wheel-modal{

        }
        .wheel-container::before{
            content:'';position:absolute;top:0;left:0;right:0;height:180px;
            background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);

        }
        .wheel-container::after{
            content:'';position:absolute;bottom:0;left:0;right:0;height:180px;

        #wheel-modal .wheel{

        #wheel-modal .wheel-item{

            justify-content:center;

            z-index:1;
            filter:blur(2px);
            opacity:0.6;
            transform:scale(0.88);
            transition:all .45s cubic-bezier(0.23,1,0.32,1);
        }
        .wheel-item.near{
            filter:blur(0.8px);
            opacity:0.88;
            transform:scale(0.96);
        }
        .wheel-item.active{
            filter:blur(0)!important;
            opacity:1!important;
            transform:scale(1.09)!important;
            background:linear-gradient(135deg, rgba(255,255,255,.38), rgba(255,255,255,.18));
            text-shadow:0 0 30px rgba(255,255,255,.9);
            box-shadow:0 0 60px rgba(255,255,255,.55);
            z-index:20;
        }

        #wheel-modal .highlight{

    <script>
        // === 背景音樂自動播放（跟夜晚沙灘修正版一樣）===
        const bgm = document.getElementById('bgm');
        const soundIcon = document.getElementById('sound-icon');
        const soundImg = document.getElementById('sound-img');
        const volumeControl = document.getElementById('volume-control');
        const volumeSlider = document.getElementById('volume-slider');
        let isPlaying = true;

        // 頁面載入後直接嘗試自動播放
        bgm.volume = 0.6;
        bgm.play().catch(() => {
            isPlaying = false; // 如果被阻擋，標記為未播放
        });

        // 初始圖示為「有聲」
        window.addEventListener('load', () => {
            soundImg.src = 'img/聲音.png';
        });

        // 聲音按鈕切換
        soundIcon.addEventListener('click', () => {
            if (isPlaying) {
                bgm.pause();
                soundImg.src = 'img/靜音.png';
                volumeControl.classList.remove('visible');
                isPlaying = false;
            } else {
                bgm.play().catch(() => {});
                soundImg.src = 'img/聲音.png';
                volumeControl.classList.add('visible');
                isPlaying = true;
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            bgm.volume = e.target.value / 100;
        });

        // 備用解鎖：如果自動播放失敗，點畫面任意處可播放
        document.body.addEventListener('click', () => {
            if (!isPlaying) {
                bgm.play().catch(() => {});
                soundImg.src = 'img/聲音.png';
                isPlaying = true;
            }
        }, { once: true });

        // === 背景影片切換 ===
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        const overlay = document.getElementById('overlay');

        v1.addEventListener('ended', () => {
            v1.classList.remove('active');
            v2.classList.add('active');
            overlay.classList.add('active');
            setTimeout(() => {
                document.getElementById('next').classList.add('active');
                document.getElementById('back').classList.add('active');
                document.getElementById('sound-icon').classList.add('active');
                document.getElementById('menu-icon').classList.add('active');
            }, 300);
        });

        // === 白點與資訊框 ===
        document.getElementById('dot1').addEventListener('click', () => {
            const card = document.getElementById('info1');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                document.getElementById('dot1').classList.add('triggered');
            }
        });
        document.getElementById('dot2').addEventListener('click', () => {
            const card = document.getElementById('info2');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                document.getElementById('dot2').classList.add('triggered');
            }
        });
        document.getElementById('dot3').addEventListener('click', () => {
            const card = document.getElementById('info3');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                document.getElementById('dot3').classList.add('triggered');
            }
        });

        document.querySelectorAll('.info-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target === card) {
                    card.classList.remove('show');
                    const num = card.id.replace('info', '');
                    document.getElementById('dot' + num).classList.remove('triggered');
                }
            });
        });

        document.querySelectorAll('.card-back-button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const card = btn.closest('.info-card');
                card.classList.remove('show');
                const num = card.id.replace('info', '');
                document.getElementById('dot' + num).classList.remove('triggered');
            });
        });

        // === 下一頁 / 上一頁 ===
        document.getElementById('next').addEventListener('click', () => {
            window.location.href = 'forth copy.html';
        });

        document.getElementById('back').addEventListener('click', () => { 
            window.location.href = 'third.html'; 
        });

        // === 溫度計拖曳（符合你想要的邏輯：範圍限制 + 根據位置切換疊加圖） ===
const thermometerContainer = document.getElementById('container');
const thermometerHandle = document.getElementById('handle');

if (thermometerHandle && thermometerContainer) {
    const thermometerMinTop = 170;    // 上限 px
    const thermometerMaxTop = 200;   // 下限 px（你原本寫 100，應該是下限？）

    let isDraggingThermometer = false;
    let thermometerStartY = 0;
    let thermometerStartTop = 0;

    // 開始拖曳
    thermometerHandle.addEventListener('mousedown', (e) => {
        isDraggingThermometer = true;
        thermometerStartY = e.clientY;
        thermometerStartTop = thermometerHandle.offsetTop;  // 使用 offsetTop 更準確
        thermometerHandle.style.cursor = 'grabbing';
        e.preventDefault();  // 防止選取或頁面滾動
    });

    // 拖曳中
    document.addEventListener('mousemove', (e) => {
        if (!isDraggingThermometer) return;

        const deltaY = e.clientY - thermometerStartY;
        let newTop = thermometerStartTop + deltaY;

        // 嚴格限制範圍
        newTop = Math.max(thermometerMinTop, Math.min(thermometerMaxTop, newTop));

        thermometerHandle.style.top = `${newTop}px`;

        // 根據把手位置切換疊加圖
        const handleTop = newTop;  // 直接用計算後的新位置

        if (handleTop <= 170) {
            document.querySelector('.temp-male').style.opacity = '1';
            document.querySelector('.temp-female').style.opacity = '0';
        } else if (handleTop >= 200) {
            document.querySelector('.temp-male').style.opacity = '0';
            document.querySelector('.temp-female').style.opacity = '1';
        } else {
            document.querySelectorAll('.overlay-image').forEach(img => {
                img.style.opacity = '0.3';
            });
        }
    });

}

        // === 滾輪選單 ===
        const menuIcon = document.getElementById('menu-icon');
        const wheelModal = document.getElementById('wheel-modal');
        const wheel = document.getElementById('wheel');
        

        const itemHeight = 130;
        let containerHeight = 0;
        let highlightOffset = 0;
        let currentIndex = 1;

        const chapters = [
            { text: '龜途', page: 'index.html' },
            { text: '起源', page: 'second copy.html' },
            { text: '破殼', page: 'third 1.html' },
            { text: '天擇', page: 'forth copy.html' },
             { text: '悲鳴', page: 'fifth.html' }
        ];

        function calculateHighlight() {
            const container = wheelModal.querySelector('.wheel-container');
            containerHeight = container.clientHeight;
            highlightOffset = containerHeight / 2 - itemHeight / 2;
        }

        function renderWheel() {
            wheel.innerHTML = '';
            chapters.forEach((chap, i) => {
                const div = document.createElement('div');
                div.className = 'wheel-item';
                div.textContent = chap.text;
                div.addEventListener('click', () => {
                    currentIndex = i;
                    updateWheel();
                    document.body.style.opacity = '0';
                    setTimeout(() => location.href = chap.page, 600);
                });
                wheel.appendChild(div);
            });
            calculateHighlight();
            updateWheel();
        }

        function updateWheel() {
            const offset = highlightOffset - currentIndex * itemHeight;
            wheel.style.transform = `translateY(${offset}px)`;

            document.querySelectorAll('.wheel-item').forEach((el, i) => {
                const distance = Math.abs(i - currentIndex);
                el.classList.remove('active', 'near');
                if (distance === 0) el.classList.add('active');
                else if (distance === 1) el.classList.add('near');
            });
        }

        menuIcon.addEventListener('click', () => {
            wheelModal.classList.add('active');
            setTimeout(renderWheel, 100);
        });

      
        wheelModal.addEventListener('click', e => { 
            if (e.target === wheelModal) wheelModal.classList.remove('active'); 
        });

        wheelModal.addEventListener('wheel', e => { 
            e.preventDefault(); 
            currentIndex += e.deltaY > 0 ? 1 : -1; 
            currentIndex = Math.max(0, Math.min(currentIndex, chapters.length - 1)); 
            updateWheel(); 
        }, { passive: false });

        let dragging = false, startY, startIdx;
        wheelModal.addEventListener('mousedown', e => { 
            if (e.target.classList.contains('wheel-item')) { 
                dragging = true; startY = e.clientY; startIdx = currentIndex; 
            } 
        });
        document.addEventListener('mousemove', e => { 
            if (dragging) { 
                const delta = e.clientY - startY; 
                currentIndex = Math.max(0, Math.min(startIdx - Math.round(delta / itemHeight), chapters.length - 1)); 
                updateWheel(); 
            } 
        });
        document.addEventListener('mouseup', () => dragging = false);

        window.addEventListener('resize', () => {
            if (wheelModal.classList.contains('active')) { 
                calculateHighlight(); 
                updateWheel(); 
            }
        });
    </script>
</body>
