<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天擇</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            height:100vh;
            overflow:hidden;
            background:#000;
            position:relative;
            font-family: system-ui, sans-serif;
        }

        /* 影片層 */
        #video-wrapper{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:1;
        }
        .video{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
            object-fit:cover;
            opacity:0;
            transition:opacity .6s ease;
        }
        .video.active{opacity:1;}

        /* 互動層 */
        #overlay{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:10;
            opacity:0;
            transition:opacity .5s ease .3s;
            pointer-events:none;
        }
        #overlay.active{
            opacity:1;
            pointer-events:auto;
        }

        /* === 雙層圓點 === */
        .info-dot {
            position: absolute;
            width: 45px; height: 45px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        .info-dot::before {
            content: '';
            position: absolute;
            inset: -8px;
            background: radial-gradient(circle, rgb(255, 255, 255) 50%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 1.6s infinite ease-in-out;
            pointer-events: none;
            z-index: -1;
        }
        .info-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            background: transparent;
            border: 4px solid rgba(255,255,255,0.881);
            border-radius: 50%;
            animation: pulse 1.6s infinite ease-in-out;
            transition: all 0.3s ease;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50%      { transform: scale(1.35); opacity: 0.9; }
        }
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50%      { transform: scale(1.4); opacity: 0.7; }
        }

        .info-dot.triggered::after {
            background: white !important;
            border-color: white !important;
            animation: none !important;
            transform: scale(1) !important;
            opacity: 1 !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.9);
        }
        .info-dot.triggered::before {
            animation: none !important;
            opacity: 0.8;
            transform: scale(1.1) !important;
        }
        .info-dot.triggered {
            pointer-events: none !important;
            cursor: default !important;
            opacity: 1 !important;
        }

        .info-dot:hover:not(.triggered) {
            transform: scale(1.3) !important;
            opacity: 1;
        }

        .dot-1{top:50%;left:10%;}
        .dot-2{top:69%;left:50%;}
        .dot-3{top:50%;left:70%;}

        /* === 資訊卡 === */
        .info-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 2500px;
            height: 1500px;
            max-width: 95%;
            max-height: 90%;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 20;
        }

        .info-card.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .info-card .card-content {
            position: relative;
            background: white;
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            font-family: "Microsoft JhengHei", sans-serif;
            font-size: 50px;
            color: #333;
            line-height: 1.8;
            max-height: 90vh;
            overflow-y: auto;
        }

        .card-back-button {
            position: absolute;
            top: -20px;
            left: -400px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            z-index: 10001;
        }

        .card-back-button:hover {
            background: #e0e0e0;
            transform: scale(1.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .card-image {
            width: 100%;
            max-width: 1500px;
            border-radius: 20px;
            margin: 20px auto 25px auto;
            display: block;
        }

        .card-text {
            line-height: 1.8;
            margin: 0 30px;
        }
        .card-text p {
            margin-bottom: 25px;
        }

        /* === 下一頁 === */
        #next{
            position:absolute;
            top:90%;
            left:50%;
            transform:translateX(-50%);
            cursor:pointer;
            z-index:11;
            opacity:0;
            transition:opacity .5s ease .3s;
        }
        #next.active{
            opacity:1;
        }
        #next img{
            max-height:200px;
            object-fit:contain;
        }

        #back{
            position:absolute;
            top:5%;
            left:50%;
            transform:translateX(-50%);
            cursor:pointer;
            z-index:11;
        }
        #back img{
            max-height:200px;
            object-fit:contain;
        }

        /* === 右上角控制區：聲音 + 三條槓 === */
        .top-right-controls {
            position: absolute;
            top: 5%;
            right: 10%;
            display: flex;
            flex-direction: row-reverse;
            align-items: center;
            gap: 30px;
            z-index: 13;
        }

        #sound-icon {
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            transition: all .5s ease .5s;
        }
        #sound-icon.active {
            opacity: 1;
            transform: translateY(0);
        }
        #sound-icon:hover {
            transform: translateY(0) scale(1.25);
        }
        #sound-icon img {
            width: 55%;
            filter: brightness(1) drop-shadow(0 0 8px rgba(255,255,255,.5));
            transition: all .3s ease;
        }
        #sound-icon:hover img {
            filter: brightness(1.3) drop-shadow(0 0 20px rgba(255,255,255,.9));
        }

        #menu-icon{
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            transition: all .5s ease .5s;
        }
        #menu-icon.active{
            opacity: 1;
            transform: translateY(0);
        }
        #menu-icon:hover{
            transform: translateY(0) scale(1.25);
        }
        #menu-icon img{
            width: 55%;
            filter: brightness(1) drop-shadow(0 0 8px rgba(255,255,255,.5));
            transition: all .3s ease;
        }
        #menu-icon:hover img{
            filter: brightness(1.3) drop-shadow(0 0 20px rgba(255,255,255,.9));
        }

        /* === 音量拉桿 === */
        #volume-control {
            position: absolute;
            top: 480px;
            right: 10%;
            width: 400px;
            height: 600px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 12;
        }
        #volume-control.visible {
            opacity: 1;
            visibility: visible;
        }
        #volume-control input[type="range"] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 500px;
            height: 80%;
            background: transparent;
            cursor: pointer;
        }
        #volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        /* === 滾輪選單 === */
        #wheel-modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.85);
            backdrop-filter:blur(15px);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:20;
            opacity:0;
            visibility:hidden;
            transition:opacity .6s ease, visibility .6s;
            pointer-events:none;
        }
        #wheel-modal.active{
            opacity:1;
            visibility:visible;
            pointer-events:auto;
        }
        #wheel-modal .wheel-container{
            width:90%;
            max-width:1200px;
            height:80vh;
            max-height:900px;
            background:rgba(255,255,255,.08);
            border-radius:28px;
            overflow:hidden;
            box-shadow:0 20px 80px rgba(0,0,0,.8);
            position:relative;
        }
        .wheel-container::before{
            content:'';position:absolute;top:0;left:0;right:0;height:280px;
            background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
            pointer-events:none;z-index:10;
        }
        .wheel-container::after{
            content:'';position:absolute;bottom:0;left:0;right:0;height:280px;
            background:linear-gradient(to top, rgba(0,0,0,.9), transparent);
            pointer-events:none;z-index:10;
        }

        #wheel-modal .wheel{
            position:absolute;top:0;width:100%;
            transition:transform .45s cubic-bezier(0.23,1,0.32,1);
        }
        #wheel-modal .wheel-item{
            height:200px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:72px;
            color:white;
            font-weight:800;
            letter-spacing:4px;
            text-shadow:0 4px 20px rgba(0,0,0,.8);
            cursor:pointer;
            position:relative;
            z-index:1;
            filter:blur(2.5px);
            opacity:0.55;
            transform:scale(0.86);
            transition:all .45s cubic-bezier(0.23,1,0.32,1);
        }
        .wheel-item.near{
            filter:blur(0.8px);
            opacity:0.88;
            transform:scale(0.95);
        }
        .wheel-item.active{
            filter:blur(0)!important;
            opacity:1!important;
            transform:scale(1.12)!important;
            background:linear-gradient(135deg, rgba(255,255,255,.38), rgba(255,255,255,.18));
            text-shadow:0 0 35px rgba(255,255,255,.95);
            box-shadow:0 0 70px rgba(255,255,255,.6);
            z-index:20;
        }

        #wheel-modal .highlight{
            position:absolute;
            top:calc(50% - 90px);
            width:100%;
            height:180px;
            background:linear-gradient(180deg, transparent 0%, rgba(255,255,255,.25) 50%, transparent 100%);
            border-top:2px solid rgba(255,255,255,.5);
            border-bottom:2px solid rgba(255,255,255,.5);
            pointer-events:none;
            z-index:5;
        }
        #close-wheel{
            position:absolute;
            top:20px;
            right:20px;
            width:60px;height:60px;
            background:rgba(255,255,255,.2);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:42px;
            color:white;
            backdrop-filter:blur(10px);
            cursor:pointer;
            z-index:30;
            transition:all .3s;
        }
        #close-wheel:hover{
            background:rgba(255,0,0,.6);
            transform:rotate(90deg);
        }
    </style>
</head>
<body>

    <!-- 背景影片 -->
    <div id="video-wrapper">
        <video id="video1" class="video active" autoplay muted preload="auto">
            <source src="video/網頁完整影片/天擇.mp4" type="video/mp4">
        </video>
        <video id="video2" class="video" autoplay muted loop preload="auto">
            <source src="video/網頁完整影片/天擇-循環.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 互動層 -->
    <div id="overlay">
        <div class="info-dot dot-1" id="dot1"></div>
        <div class="info-dot dot-2" id="dot2"></div>
        <div class="info-dot dot-3" id="dot3"></div>

        <!-- 資訊框1 -->
        <div id="info1" class="info-card">
            <div class="card-back-button">←</div>
            <div class="card-content">
                <img src="img/沖毀.jpg" alt="颱風巨浪" class="card-image">
                <div class="card-text">
                    <p>颱風引發的滔天巨浪會直接沖刷和淹沒產卵的沙灘，將卵窩沖散或沖毀，導致大量卵無法孵化。受颱風浪況影響，長時間淹水會阻礙卵窩氣體交換，抑制胚胎發育。</p>
                </div>
            </div>
        </div>

        <!-- 資訊框2 -->
        <div id="info2" class="info-card">
            <div class="card-back-button">←</div>
            <div class="card-content">
                <img src="img/天敵撿拾.jpg" alt="迷失的小綠蠵龜" class="card-image">
                <div class="card-text">
                    <p>天敵如海鷗、螃蟹、野狗等會在沙灘上等待稚龜出現，由於牠們的背殼不夠堅硬、游泳速度不夠快，缺乏足夠的防禦能力，導致小綠蠵龜在第一年的死亡率極高，僅約1%能長大成成龜。</p>
                </div>
            </div>
        </div>

        <!-- 資訊框3 -->
        <div id="info3" class="info-card">
            <div class="card-back-button">←</div>
            <div class="card-content">
                <img src="img/漂流木.jpg" alt="漂流木阻礙" class="card-image">
                <div class="card-text">
                    <p>強烈風浪會將大量的珊瑚礁石、漂流木及其他雜物堆積在產卵沙灘上，除了阻礙小綠蠵龜前往大海，還可能因為颱風帶來的巨浪而迷失方向，導致體力耗盡，甚至擱淺在沙灘上死亡。</p>
                </div>
            </div>
        </div>

        <!-- 下一頁 -->
        <div id="next">
            <img src="img/Icon-下一頁.png" alt="下一頁">
        </div>

        <div id="back">
            <img src="img/Icon-上一頁.png" alt="上一頁">
        </div>

        <!-- 右上角控制區 -->
        <div class="top-right-controls">
            <div id="sound-icon">
                <img src="img/靜音.png" alt="聲音開關" id="sound-img">
            </div>
            <div id="menu-icon">
                <img src="img/Icon-三條槓.png" alt="選單">
            </div>
        </div>

        <!-- 音量拉桿 -->
        <div id="volume-control">
            <input type="range" id="volume-slider" min="0" max="100" value="60" step="1">
        </div>

        <!-- 滾輪選單 -->
        <div id="wheel-modal">
            <div class="wheel-container">
                <div class="highlight"></div>
                <div class="wheel" id="wheel"></div>
            </div>
            
        </div>

        <!-- 背景音樂 -->
        <audio id="bgm" preload="auto" loop>
            <source src="video/Comp 4-1.mp3" type="audio/mp3">
        </audio>
    </div>

    <script>
        // === 背景音樂自動播放（跟夜晚沙灘一樣）===
        const bgm = document.getElementById('bgm');
        const soundIcon = document.getElementById('sound-icon');
        const soundImg = document.getElementById('sound-img');
        const volumeControl = document.getElementById('volume-control');
        const volumeSlider = document.getElementById('volume-slider');
        let isPlaying = true;

        // 頁面載入後直接嘗試自動播放
        bgm.volume = 0.6;
        bgm.play().catch(() => {
            isPlaying = false; // 如果被阻擋，標記為未播放
        });

        // 初始圖示為「有聲」
        window.addEventListener('load', () => {
            soundImg.src = 'img/聲音.png';
        });

        // 聲音按鈕切換
        soundIcon.addEventListener('click', () => {
            if (isPlaying) {
                bgm.pause();
                soundImg.src = 'img/靜音.png';
                volumeControl.classList.remove('visible');
                isPlaying = false;
            } else {
                bgm.play().catch(() => {});
                soundImg.src = 'img/聲音.png';
                volumeControl.classList.add('visible');
                isPlaying = true;
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            bgm.volume = e.target.value / 100;
        });

        // 備用解鎖：如果自動播放失敗，點畫面任意處可播放
        document.body.addEventListener('click', () => {
            if (!isPlaying) {
                bgm.play().catch(() => {});
                soundImg.src = 'img/聲音.png';
                isPlaying = true;
            }
        }, { once: true });

        // === 背景影片切換 ===
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        const overlay = document.getElementById('overlay');

        v1.addEventListener('ended', () => {
            v1.classList.remove('active');
            v2.classList.add('active');
            overlay.classList.add('active');
            setTimeout(() => {
                document.getElementById('next').classList.add('active');
                document.getElementById('back').classList.add('active');
                document.getElementById('sound-icon').classList.add('active');
                document.getElementById('menu-icon').classList.add('active');
            }, 300);
        });

        // === 白點與資訊框 ===
        document.getElementById('dot1').addEventListener('click', () => {
            const card = document.getElementById('info1');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                document.getElementById('dot1').classList.add('triggered');
            }
        });
        document.getElementById('dot2').addEventListener('click', () => {
            const card = document.getElementById('info2');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                document.getElementById('dot2').classList.add('triggered');
            }
        });
        document.getElementById('dot3').addEventListener('click', () => {
            const card = document.getElementById('info3');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                document.getElementById('dot3').classList.add('triggered');
            }
        });

        document.querySelectorAll('.info-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target === card || e.target === card.querySelector('.card-content')) {
                    card.classList.remove('show');
                    const num = card.id.replace('info', '');
                    document.getElementById('dot' + num).classList.remove('triggered');
                }
            });
        });

        document.querySelectorAll('.card-back-button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const card = btn.closest('.info-card');
                card.classList.remove('show');
                const num = card.id.replace('info', '');
                document.getElementById('dot' + num).classList.remove('triggered');
            });
        });

        // === 下一頁 ===
        document.getElementById('next').addEventListener('click', () => {
            window.location.href = 'fifth.html';  // 請改成你的下一頁
        });

        document.getElementById('back').addEventListener('click', () => { 
            window.location.href = 'third 1.html'; 
        });

        // === 滾輪選單 ===
        const menuIcon = document.getElementById('menu-icon');
        const wheelModal = document.getElementById('wheel-modal');
        const wheel = document.getElementById('wheel');
        

        const itemHeight = 200;
        let containerHeight = 0;
        let highlightOffset = 0;
        let currentIndex = 3;  // 「天擇」在列表中是第4個（索引3）

        const chapters = [
            { text: '龜途', page: 'test5 copy.html' },
            { text: '起源', page: 'second copy.html' },
            { text: '破殼', page: 'third 1.html' },
            { text: '天擇', page: 'forth copy.html' },
             { text: '悲鳴', page: 'fifth.html' }
        ];

        function calculateHighlight() {
            const container = wheelModal.querySelector('.wheel-container');
            containerHeight = container.clientHeight;
            highlightOffset = containerHeight / 2 - itemHeight / 2;
        }

        function renderWheel() {
            wheel.innerHTML = '';
            chapters.forEach((chap, i) => {
                const div = document.createElement('div');
                div.className = 'wheel-item';
                div.textContent = chap.text;
                div.addEventListener('click', () => {
                    currentIndex = i;
                    updateWheel();
                    document.body.style.opacity = '0';
                    setTimeout(() => location.href = chap.page, 600);
                });
                wheel.appendChild(div);
            });
            calculateHighlight();
            updateWheel();
        }

        function updateWheel() {
            const offset = highlightOffset - currentIndex * itemHeight;
            wheel.style.transform = `translateY(${offset}px)`;

            document.querySelectorAll('.wheel-item').forEach((el, i) => {
                const distance = Math.abs(i - currentIndex);
                el.classList.remove('active', 'near');
                if (distance === 0) el.classList.add('active');
                else if (distance === 1) el.classList.add('near');
            });
        }

        menuIcon.addEventListener('click', () => {
            wheelModal.classList.add('active');
            setTimeout(renderWheel, 100);
        });
        
        wheelModal.addEventListener('click', e => { if (e.target === wheelModal) wheelModal.classList.remove('active'); });

        wheelModal.addEventListener('wheel', e => { 
            e.preventDefault(); 
            currentIndex += e.deltaY > 0 ? 1 : -1; 
            currentIndex = Math.max(0, Math.min(currentIndex, chapters.length - 1)); 
            updateWheel(); 
        }, { passive: false });

        let dragging = false, startY, startIdx;
        wheelModal.addEventListener('mousedown', e => { 
            if (e.target.classList.contains('wheel-item')) { 
                dragging = true; startY = e.clientY; startIdx = currentIndex; 
            } 
        });
        document.addEventListener('mousemove', e => { 
            if (dragging) { 
                const delta = e.clientY - startY; 
                currentIndex = Math.max(0, Math.min(startIdx - Math.round(delta / itemHeight), chapters.length - 1)); 
                updateWheel(); 
            } 
        });
        document.addEventListener('mouseup', () => dragging = false);

        window.addEventListener('resize', () => {
            if (wheelModal.classList.contains('active')) { 
                calculateHighlight(); 
                updateWheel(); 
            }
        });
    </script>
</body>
</html>
