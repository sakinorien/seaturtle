<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刺網</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            height:100vh;
            overflow:hidden;
            background:#000;
            position:relative;
        }

        /* 影片層 */
        #video-wrapper{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:1;
        }
        .video{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
            object-fit:cover;
            opacity:0;
            transition:opacity .6s ease;
            background:#000;
        }
        .video.active{opacity:1;}

        /* 互動層 */
        #overlay{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:10;
            opacity:0;
            transition:opacity .5s ease .3s;
            pointer-events:none;
        }
        #overlay.active{
            opacity:1;
            pointer-events:auto;
        }

         /* === 雙層圓點 - 縮小 === */
        .info-dot {
            position: relative;
            width: 28px; 
            height: 28px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        .info-dot::before {
            content: '';
            position: absolute;
            inset: -6px;
            background: radial-gradient(circle, rgb(255, 255, 255) 50%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 1.8s infinite ease-in-out;
            pointer-events: none;
            z-index: -1;
        }
        .info-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            background: transparent;
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            animation: pulse 1.8s infinite ease-in-out;
            transition: all 0.3s ease;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.65; }
            50%      { transform: scale(1.4); opacity: 0.95; }
        }
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.45; }
            50%      { transform: scale(1.45); opacity: 0.75; }
        }

        .info-dot.triggered::after {
            background: white !important;
            border-color: white !important;
            animation: none !important;
            transform: scale(1) !important;
            opacity: 1 !important;
            box-shadow: 0 0 16px rgba(255,255,255,0.85);
        }
        .info-dot.triggered::before {
            animation: none !important;
            opacity: 0.85;
            transform: scale(1.08) !important;
        }
        .info-dot.triggered {
            pointer-events: none !important;
            cursor: default !important;
            opacity: 1 !important;
        }

        .info-dot:hover {
            transform: scale(1.4) !important;
            opacity: 1;
        }
        .dot-1{top:70%;left:60%;}

         /* 資訊卡 - 左右並排布局：左圖右文字 + 標題 */
.info-card {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    width: 90%;
    max-width: 900px;              /* 稍微加寬一點，讓左右並排更舒適 */
    max-height: 400px;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    z-index: 20;
    overflow: visible;
}

.info-card.show {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
}

.info-card .card-content {
    position: relative;
    background: rgba(180, 190, 200, 0.85);
    padding: 30px;
    border-radius: 24px;
    display: flex;                 /* 改成 flex 左右並排 */
    flex-direction: row;
    gap: 30px;                     /* 圖文間距 */
    align-items: flex-start;
    height: auto;
}

/* 左側圖片區 */
.card-image-container {
    flex: 0 0 45%;                 /* 圖片佔 45% 寬度，可調 40%~50% */
    max-width: 400px;
}

.card-image {
    width: 100%;
    border-radius: 16px;
    display: block;
}

/* 右側文字區 */
.card-text-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.card-title {
    font-size: 32px;               /* 標題大小 */
    font-weight: bold;
    color: #222;
    margin-bottom: 20px;
    text-align: center;            /* 或改 left 左對齊 */
    line-height: 1.3;
}

.card-text {
    line-height: 1.7;
    font-size: 1.05em;
    color: #333;
}

.card-text p {
    margin-bottom: 18px;
}

.card-back-button {
            position: absolute;
            top: 0px;
            left: -60px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: #333;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            transition: all 0.25s ease;
            z-index: 30;
        }

        .card-back-button:hover {
            background: rgba(180, 190, 200, 0.85);
            transform: scale(1.2);
        }



        /* 下一頁 / 上一頁 */
        #next, #back {
            position:absolute;
            cursor:pointer;
            z-index:11;
        }
        #next {
            bottom: 4%;
            left:50%;
            transform:translateX(-50%);
        }
        #back {
            top: 3%;
            left:50%;
            transform:translateX(-50%);
        }
        #next img, #back img {
            height: auto;
            width: auto;
            max-height: 40px;
            object-fit: contain;
        }

        /* 右上控制區 - 分開定位 */
        .top-right-controls {
            position: absolute;
            top: 3%;
            right: 3%;
            z-index: 13;
        }

        #sound-icon {
            position: absolute;
            top: 0;
            right: 0;
            width: 64px;
            height: 64px;
            opacity: 0;
            transform: translateY(20px);
            transition: all .5s ease .5s;
            cursor: pointer;
        }

        #sound-icon.active {
            opacity: 1;
            transform: translateY(0);
        }

        #sound-icon:hover {
            transform: translateY(0) scale(1.18);
        }

        #menu-icon {
            position: absolute;
            top: 7px;                 /* 往下移距離，可自行調整 60~100px */
            right: 80px;
            width: 64px;
            height: 64px;
            opacity: 0;
            transform: translateY(20px);
            transition: all .5s ease .6s;
            cursor: pointer;
        }

        #menu-icon.active {
            opacity: 1;
            transform: translateY(0);
        }

        #menu-icon:hover {
            transform: translateY(0) scale(1.18);
        }

        #sound-icon img, #menu-icon img {
            width: 80%;
            filter: brightness(1) drop-shadow(0 0 6px rgba(255,255,255,.6));
            transition: all .25s ease;
        }

        #sound-icon:hover img, #menu-icon:hover img {
            filter: brightness(1.4) drop-shadow(0 0 14px rgba(255,255,255,.9));
        }

        /* 音量拉桿 */
        #volume-control {
            position: absolute;
            top: 18%;
            right: 4%;
            width: 80px;
            height: 320px;
            background: rgba(255,255,255,0.12);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 12;
        }
        #volume-control.visible {
            opacity: 1;
            visibility: visible;
        }
        #volume-control input[type="range"] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 16px;
            height: 85%;
            background: transparent;
            cursor: pointer;
        }
        #volume-control input[type="range"]::-webkit-slider-thumb {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255,255,255,0.7);
        }

        /* 滾輪選單 - 等比例縮小 */
        #wheel-modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.85);
            backdrop-filter:blur(15px);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:20;
            opacity:0;
            visibility:hidden;
            transition:opacity .6s ease, visibility .6s;
            pointer-events:none;
        }
        #wheel-modal.active{
            opacity:1;
            visibility:visible;
            pointer-events:auto;
        }
        #wheel-modal .wheel-container{
            width: 88%;
            max-width: 820px;
            height: 72vh;
            max-height: 620px;
            background:rgba(255,255,255,.08);
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 16px 60px rgba(0,0,0,.75);
            position:relative;
        }
        .wheel-container::before{
            content:'';position:absolute;top:0;left:0;right:0;height:180px;
            background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
            pointer-events:none;z-index:10;
        }
        .wheel-container::after{
            content:'';position:absolute;bottom:0;left:0;right:0;height:180px;
            background:linear-gradient(to top, rgba(0,0,0,.9), transparent);
            pointer-events:none;z-index:10;
        }

        #wheel-modal .wheel{
            position:absolute;top:0;width:100%;
            transition:transform .45s cubic-bezier(0.23,1,0.32,1);
        }
        #wheel-modal .wheel-item{
            height:130px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:48px;
            color:white;
            font-weight:800;
            letter-spacing:3px;
            text-shadow:0 3px 16px rgba(0,0,0,.8);
            cursor:pointer;
            position:relative;
            z-index:1;
            filter:blur(2px);
            opacity:0.6;
            transform:scale(0.88);
            transition:all .45s cubic-bezier(0.23,1,0.32,1);
        }
        .wheel-item.near{
            filter:blur(0.8px);
            opacity:0.88;
            transform:scale(0.96);
        }
        .wheel-item.active{
            filter:blur(0)!important;
            opacity:1!important;
            transform:scale(1.09)!important;
            background:linear-gradient(135deg, rgba(255,255,255,.38), rgba(255,255,255,.18));
            text-shadow:0 0 30px rgba(255,255,255,.9);
            box-shadow:0 0 60px rgba(255,255,255,.55);
            z-index:20;
        }

        #wheel-modal .highlight{
            position:absolute;
            top:calc(50% - 65px);
            width:100%;
            height:130px;
            background:linear-gradient(180deg, transparent 0%, rgba(255,255,255,.25) 50%, transparent 100%);
            border-top:2px solid rgba(255,255,255,.5);
            border-bottom:2px solid rgba(255,255,255,.5);
            pointer-events:none;
            z-index:5;
        }

        #close-wheel{
            position:absolute;
            top:16px;
            right:16px;
            width:52px;height:52px;
            background:rgba(255,255,255,.2);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:32px;
            color:white;
            backdrop-filter:blur(10px);
            cursor:pointer;
            z-index:30;
            transition:all .3s;
        }
        #close-wheel:hover{
            background:rgba(255,0,0,.6);
            transform:rotate(90deg);
        }

        /* 前景影片 */
        #foreground-video-wrapper {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100vh;
            z-index: 4;
            pointer-events: none;
            overflow: hidden;
        }
        .fg-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .fg-video.active { opacity: 1; }
    </style>
</head>
<body>

    <!-- 背景影片層 -->
    <div id="video-wrapper">
        <video id="video1" class="video active" autoplay muted preload="auto">
            <source src="video/網頁完整影片/悲鳴-開頭.mp4" type="video/mp4">
        </video>
        <video id="video2" class="video" autoplay muted loop preload="auto">
            <source src="video/網頁完整影片/刺網影片.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 互動層 -->
    <div id="overlay">
        <!-- 前景影片 -->
        <div id="foreground-video-wrapper">
            <video id="fg-video1" class="fg-video active" autoplay muted loop preload="auto">
                <source src="video/海龜困住.webm" type="video/webm">
            </video>
            <video id="fg-video2" class="fg-video" autoplay muted preload="auto">
                <source src="video/海龜移動.webm" type="video/webm">
            </video>
        </div>

        <!-- 白點 -->
        <div class="info-dot dot-1" id="dot1"></div>

       <!-- 資訊框1 -->
<div id="info1" class="info-card">
    <div class="card-back-button">←</div>
    <div class="card-content">
        <!-- 左邊圖片 -->
        <div class="card-image-container">
            <img src="img/14075818-031C-4488-B081-636FD4E554B9.png" alt="" class="card-image">
        </div>
        
        <!-- 右邊文字 + 標題 -->
        <div class="card-text-container">
            <h2 class="card-title">廢棄魚線纏繞導致截肢</h2>
            <div class="card-text">
                <p>廢棄魚線或漁網很容易纏繞在綠蠵龜的頸部、四肢，造成肢體變形、傷口感染，長期下來就是變相截肢，無法擺脫魚線的綠蠵龜將隨著時間失去前、後肢。</p>
            </div>
        </div>
    </div>
</div>

        <div id="next">
            <img src="img/Icon-下一頁.png" alt="下一頁">
        </div>

        <div id="back">
            <img src="img/Icon-上一頁.png" alt="上一頁">
        </div>

        <div class="top-right-controls">
            <div id="sound-icon">
                <img src="img/靜音.png" alt="聲音開關" id="sound-img">
            </div>
            <div id="menu-icon">
                <img src="img/Icon-三條槓.png" alt="選單">
            </div>
        </div>

        <div id="volume-control">
            <input type="range" id="volume-slider" min="0" max="100" value="60" step="1">
        </div>

        <div id="wheel-modal">
            <div class="wheel-container">
                <div class="highlight"></div>
                <div class="wheel" id="wheel"></div>
            </div>
        </div>

        <audio id="bgm" preload="auto" loop>
            <source src="video/夜晚.mp3" type="audio/mp3">
        </audio>
    </div>

    <script>
    window.addEventListener('DOMContentLoaded', () => {
        // === 元素變數 ===
        const bgm = document.getElementById('bgm');
        const soundIcon = document.getElementById('sound-icon');
        const soundImg = document.getElementById('sound-img');
        const volumeControl = document.getElementById('volume-control');
        const volumeSlider = document.getElementById('volume-slider');
        const overlay = document.getElementById('overlay');
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        const fgVideo1 = document.getElementById('fg-video1');
        const fgVideo2 = document.getElementById('fg-video2');

        let isPlaying = true;
        let hasSwitched = false;  // 前景只切換一次

        // === 背景音樂 ===
        bgm.volume = 0.6;
        bgm.play().catch(() => { isPlaying = false; });

        window.addEventListener('load', () => {
            soundImg.src = 'img/聲音.png';
        });

        soundIcon.addEventListener('click', () => {
            if (isPlaying) {
                bgm.pause();
                soundImg.src = 'img/靜音.png';
                volumeControl.classList.remove('visible');
                isPlaying = false;
            } else {
                bgm.play().catch(() => {});
                soundImg.src = 'img/聲音.png';
                volumeControl.classList.add('visible');
                isPlaying = true;
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            bgm.volume = e.target.value / 100;
        });

        document.body.addEventListener('click', () => {
            if (!isPlaying) {
                bgm.play().catch(() => {});
                soundImg.src = 'img/聲音.png';
                isPlaying = true;
            }
        }, { once: true });

        // === 背景影片自動切換（已修復） ===
        video1.addEventListener('ended', () => {
            console.log('背景影片1（悲鳴-開頭）結束，自動切換到背景影片2（刺網影片）');
            video1.classList.remove('active');
            video2.classList.add('active');
            video2.currentTime = 0;
            video2.play().catch(err => console.error('video2 播放失敗:', err));
        });

        // 確保第一段開始播放
        video1.play().catch(err => console.error('video1 播放失敗:', err));

        // === 互動層出現 + 前景點擊切換 ===
        setTimeout(() => {
            overlay.classList.add('active');
            document.getElementById('next').classList.add('active');
            document.getElementById('back').classList.add('active');
            document.getElementById('sound-icon').classList.add('active');
            document.getElementById('menu-icon').classList.add('active');

            // 前景點擊切換（只執行一次）
            overlay.addEventListener('click', function switchFgVideo(e) {
                // 排除控制區域點擊
                if (e.target.closest('.top-right-controls, .info-card, .info-dot, #wheel-modal, #next, #back, #volume-control')) {
                    return;
                }

                if (hasSwitched) return;

                console.log('畫面點擊觸發：前景從 海龜困住 切換到 海龜移動');

                fgVideo1.classList.remove('active');
                fgVideo2.classList.add('active');

                fgVideo2.currentTime = 0;
                fgVideo2.play().catch(err => console.error('fgVideo2 播放失敗:', err));

                fgVideo2.loop = false;  // 確保第二段不循環

                hasSwitched = true;
            });
        }, 8000);

        // === 白點與資訊卡 ===
        document.getElementById('dot1').addEventListener('click', () => {
            const card = document.getElementById('info1');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                document.getElementById('dot1').classList.add('triggered');
            }
        });

        document.querySelectorAll('.info-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target === card) {
                    card.classList.remove('show');
                    const num = card.id.replace('info', '');
                    document.getElementById('dot' + num).classList.remove('triggered');
                }
            });
        });

        document.querySelectorAll('.card-back-button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const card = btn.closest('.info-card');
                card.classList.remove('show');
                const num = card.id.replace('info', '');
                document.getElementById('dot' + num).classList.remove('triggered');
            });
        });

        // === 下一頁 / 上一頁 ===
        document.getElementById('next').addEventListener('click', () => {
            window.location.href = 'sixth.html';
        });

        document.getElementById('back').addEventListener('click', () => { 
            window.location.href = 'second copy.html'; 
        });

         // === 滾輪選單 ===
        const menuIcon = document.getElementById('menu-icon');
        const wheelModal = document.getElementById('wheel-modal');
        const wheel = document.getElementById('wheel');
        

        const itemHeight = 130;
        let containerHeight = 0;
        let highlightOffset = 0;
        let currentIndex = 1;

        const chapters = [
            { text: '龜途', page: 'index.html' },
            { text: '起源', page: 'second copy.html' },
            { text: '破殼', page: 'third 1.html' },
            { text: '天擇', page: 'forth copy.html' },
             { text: '悲鳴', page: 'fifth.html' }
        ];

        function calculateHighlight() {
            const container = wheelModal.querySelector('.wheel-container');
            containerHeight = container.clientHeight;
            highlightOffset = containerHeight / 2 - itemHeight / 2;
        }

        function renderWheel() {
            wheel.innerHTML = '';
            chapters.forEach((chap, i) => {
                const div = document.createElement('div');
                div.className = 'wheel-item';
                div.textContent = chap.text;
                div.addEventListener('click', () => {
                    currentIndex = i;
                    updateWheel();
                    document.body.style.opacity = '0';
                    setTimeout(() => location.href = chap.page, 600);
                });
                wheel.appendChild(div);
            });
            calculateHighlight();
            updateWheel();
        }

        function updateWheel() {
            const offset = highlightOffset - currentIndex * itemHeight;
            wheel.style.transform = `translateY(${offset}px)`;

            document.querySelectorAll('.wheel-item').forEach((el, i) => {
                const distance = Math.abs(i - currentIndex);
                el.classList.remove('active', 'near');
                if (distance === 0) el.classList.add('active');
                else if (distance === 1) el.classList.add('near');
            });
        }

        menuIcon.addEventListener('click', () => {
            wheelModal.classList.add('active');
            setTimeout(renderWheel, 100);
        });

      
        wheelModal.addEventListener('click', e => { 
            if (e.target === wheelModal) wheelModal.classList.remove('active'); 
        });

        wheelModal.addEventListener('wheel', e => { 
            e.preventDefault(); 
            currentIndex += e.deltaY > 0 ? 1 : -1; 
            currentIndex = Math.max(0, Math.min(currentIndex, chapters.length - 1)); 
            updateWheel(); 
        }, { passive: false });

        let dragging = false, startY, startIdx;
        wheelModal.addEventListener('mousedown', e => { 
            if (e.target.classList.contains('wheel-item')) { 
                dragging = true; startY = e.clientY; startIdx = currentIndex; 
            } 
        });
        document.addEventListener('mousemove', e => { 
            if (dragging) { 
                const delta = e.clientY - startY; 
                currentIndex = Math.max(0, Math.min(startIdx - Math.round(delta / itemHeight), chapters.length - 1)); 
                updateWheel(); 
            } 
        });
        document.addEventListener('mouseup', () => dragging = false);

        window.addEventListener('resize', () => {
            if (wheelModal.classList.contains('active')) { 
                calculateHighlight(); 
                updateWheel(); 
            }
        });
    });
    </script>
</body>
</html>
