<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龜途</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .wrapper {
            position: relative;
            width: 100%;
            transition: transform 1s ease-in-out;
        }
        /* 封面區塊 */
        .cover {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        .cover video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translate(-50%, -50%);
        }
        
        .text {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 700px;
            min-height: 700px;
            width: auto;
            height: auto;
            background: url('img/字.png') no-repeat center;
            background-size: contain;
            cursor: pointer;

            /* 呼吸動畫：讓文字輕微跳動吸引目光 */
            animation: pulse 2.8s infinite ease-in-out;
            opacity: 0.92;  /* 稍微柔和一點，可改回 1 */
        }

        .text:hover {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
            transition: all 0.35s ease;
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.08);  /* 幅度溫和，可調 1.06 ~ 1.12 */
            }
        }

        /* 內容區塊 */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }
        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .container video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translate(-50%, -50%);
        }

        .title-image1, .title-image2 {
            position: absolute;
            z-index: -1;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
        }
        .title-image1 { top: 50%; left: 50%; }
        .title-image2 { top: 50%; left: 50%; }

        .text1, .text2 {
            position: absolute;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            cursor: pointer;
        }
        .text1 {
            top: 50%;
            left: 40%;
            transform: translate(-50%, -50%);
            width: 650px;
            max-width: 100%;
            height: 400px;
            background-image: url('img/選擇/識龜.png');
        }
        .text2 {
            top: 85%;
            left: 55%;
            transform: translate(-50%, -50%);
            width: 1000px;
            max-width: 100%;
            height: 700px;
            background-image: url('img/選擇/沉入深海.png');
        }

        section {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }
        section.visible { opacity: 1; transform: translateY(0); }
        #section2 { background-color: rgba(0, 0, 0, 0.7); }

        /* 聲音控制區域 */
        .sound-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .sound-toggle {
            width: 200px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        .sound-toggle:hover {
            background-color: rgba(0, 0, 0, 0.7);
            transform: scale(1.1);
        }
        .sound-toggle img {
            width: 200px;
            height: 200px;
        }

        .volume-slider {
            width: 200px;
            height: 320px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .volume-slider.visible {
            opacity: 1;
            visibility: visible;
        }
        .volume-slider input[type="range"] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 100px;
            height: 100%;
            background: transparent;
            cursor: pointer;
        }
        .volume-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="cover" id="cover">
            <video autoplay muted loop>
                <source src="video/bg.mp4" type="video/mp4">
            </video>
            <div class="text" onclick="scrollToSection('container')"></div>
            <!-- 已移除 next-btn，按鈕功能合併到 .text 上 -->
        </div>

        <div class="container" id="container">
            <video autoplay muted loop playsinline>
                <source src="video/選擇介面.mp4" type="video/mp4">
            </video>
            <img src="img/選擇/export202509071356493040.png" alt="" class="title-image1">
            <img src="img/選擇/export202509071356577320.png" alt="" class="title-image2">
            <div class="text1" onclick="window.location.href='turtle.html'"></div>
            <div class="text2" onclick="window.location.href='second copy.html'"></div>
        </div>

        <section id="section1"></section>
        <section id="section2"></section>
    </div>

    <!-- 背景音樂 -->
    <audio id="bgm" loop preload="auto">
        <source src="video/55piw-361ja.mp3" type="audio/mpeg">
    </audio>

    <!-- 聲音控制區域 -->
    <div class="sound-control">
        <div class="volume-slider" id="volumeSlider">
            <input type="range" id="volumeControl" min="0" max="100" value="70" step="1">
        </div>

        <div class="sound-toggle" onclick="toggleSound()">
            <img src="img/靜音.png" alt="聲音開關" id="sound-icon">
        </div>
    </div>

    <script>
        const bgm = document.getElementById('bgm');
        const soundIcon = document.getElementById('sound-icon');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeControl = document.getElementById('volumeControl');
        let isPlaying = false;

        // 初始音量 70%
        bgm.volume = 0.7;

        function toggleSound() {
            if (isPlaying) {
                bgm.pause();
                soundIcon.src = 'img/靜音.png';
                volumeSlider.classList.remove('visible');
                isPlaying = false;
            } else {
                bgm.play();
                soundIcon.src = 'img/聲音.png';
                volumeSlider.classList.add('visible');
                isPlaying = true;
            }
        }

        volumeControl.addEventListener('input', function() {
            bgm.volume = this.value / 100;
        });

        window.onload = function() {
            soundIcon.src = 'img/靜音.png';
            volumeSlider.classList.remove('visible');
        };

        function scrollToSection(sectionId) {
            const wrapper = document.querySelector('.wrapper');
            const targetElement = document.querySelector(`#${sectionId}`);
            if (targetElement) {
                const index = Array.from(wrapper.children).indexOf(targetElement);
                const offset = index * window.innerHeight;
                if (sectionId === 'container') {
                    const text = document.querySelector('.text');
                    text.style.transition = 'opacity 1s';
                    text.style.opacity = '0';
                    setTimeout(() => {
                        wrapper.style.transform = `translateY(-${offset}px)`;
                        text.style.display = 'none';
                        targetElement.classList.add('visible');
                    }, 1000);
                } else {
                    wrapper.style.transform = `translateY(-${offset}px)`;
                    targetElement.classList.add('visible');
                }
            }
        }
    </script>
</body>
</html>
