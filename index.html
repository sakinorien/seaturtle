<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龜途</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            touch-action: manipulation;
        }

        .wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* ==================== 封面頁 ==================== */
        .cover {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .text {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            max-width: 250px;
            height: 60vw;
            max-height: 270px;
            background: url('img/字.png') no-repeat center;
            background-size: contain;
            cursor: pointer;
            animation: pulse 2.8s infinite ease-in-out;
            opacity: 0.92;
            z-index: 10;
            user-select: none;
        }

        .text:hover,
        .text:active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.08);
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50%      { transform: translate(-50%, -50%) scale(1.04); }
        }

        /* ==================== 選擇頁 ==================== */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            opacity: 0;
            transform: translateY(60px);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .title-image1, .title-image2 {
            pointer-events: none;
        }

        /* text1 & text2 - 完全保留你原本大小與位置，且按壓時不會位移 */
        .text1, .text2 {
            position: absolute;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            cursor: pointer;
            user-select: none;
            /* 移除會造成位移的 transition，只保留輕微縮放 */
            transition: transform 0.15s ease;
        }

        .text1 {
            top: 50%;
            left: 40%;
            transform: translate(-50%, -50%);
            width: 60vw;
            max-width: 200px;
            height: 42vw;
            max-height: 550px;
            background-image: url('img/選擇/識龜.png');
        }

        .text2 {
            top: 85%;
            left: 55%;
            transform: translate(-50%, -50%);
            width: 70vw;
            max-width: 300px;
            height: 42vw;
            max-height: 550px;
            background-image: url('img/選擇/沉入深海.png');
        }

        /* 按下時只縮小，不改變位置 */
        .text1:active,
        .text2:active {
            transform: translate(-50%, -50%) scale(0.92);
        }

        /* ==================== 聲音控制 ==================== */
        .sound-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .sound-toggle {
            width: 68px;
            height: 68px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .sound-toggle:hover {
            background: rgba(0, 0, 0, 0.85);
            transform: scale(1.12);
        }

        .sound-toggle img {
            width: 68px;
            height: 68px;
        }

        .volume-slider {
            width: 48px;
            height: 180px;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 30px;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(8px);
        }

        .volume-slider.visible {
            opacity: 1;
            visibility: visible;
        }

        .volume-slider input[type="range"] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 160px;
            height: 24px;
            transform: rotate(180deg);
            cursor: pointer;
        }

        /* ==================== 響應式微調 ==================== */
        @media (max-width: 768px) {
            .text {
                width: 55vw;
                max-width: 280px;
                height: 55vw;
                max-height: 280px;
            }

            .text1 {
                width: 54vw;
                max-width: 195px;
            }
            .text2 {
                width: 68vw;
                max-width: 295px;
            }
        }

        @media (max-width: 480px) {
            .sound-control {
                bottom: 15px;
                right: 15px;
            }
            .sound-toggle, .sound-toggle img {
                width: 60px;
                height: 60px;
            }

            .text1 {
                width: 50vw;
                max-width: 175px;
            }
            .text2 {
                width: 70vw;
                max-width: 270px;
                top: 83%;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper" id="wrapper">
        <!-- 封面 -->
        <div class="cover" id="cover">
            <video autoplay muted loop playsinline class="bg-fill">
                <source src="video/bg.mp4" type="video/mp4">
            </video>
            <div class="text" onclick="scrollToContainer()"></div>
        </div>

        <!-- 選擇頁 -->
        <div class="container" id="container">
            <video autoplay muted loop playsinline class="bg-fill">
                <source src="video/選擇介面.mp4" type="video/mp4">
            </video>
            
            <img src="img/選擇/export202509071356493040.png" alt="" class="title-image1 bg-fill">
            <img src="img/選擇/export202509071356577320.png" alt="" class="title-image2 bg-fill">

            <div class="text1" onclick="window.location.href='turtle.html'"></div>
            <div class="text2" onclick="window.location.href='second copy.html'"></div>
        </div>
    </div>

    <!-- 背景音樂 -->
    <audio id="bgm" loop preload="auto">
        <source src="video/55piw-361ja.mp3" type="audio/mpeg">
    </audio>

    <!-- 聲音控制 -->
    <div class="sound-control">
        <div class="volume-slider" id="volumeSlider">
            <input type="range" id="volumeControl" min="0" max="100" value="70" step="1">
        </div>
        <div class="sound-toggle" onclick="toggleSound()">
            <img src="img/靜音.png" alt="聲音開關" id="sound-icon">
        </div>
    </div>

    <script>
        const bgm = document.getElementById('bgm');
        const soundIcon = document.getElementById('sound-icon');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeControl = document.getElementById('volumeControl');
        const wrapper = document.getElementById('wrapper');
        let isPlaying = false;

        bgm.volume = 0.7;

        function toggleSound() {
            if (isPlaying) {
                bgm.pause();
                soundIcon.src = 'img/靜音.png';
                volumeSlider.classList.remove('visible');
                isPlaying = false;
            } else {
                bgm.play().catch(() => {});
                soundIcon.src = 'img/聲音.png';
                volumeSlider.classList.add('visible');
                isPlaying = true;
            }
        }

        volumeControl.addEventListener('input', () => {
            bgm.volume = volumeControl.value / 100;
        });

        function scrollToContainer() {
            const text = document.querySelector('.text');
            const container = document.getElementById('container');

            text.style.transition = 'opacity 1s ease';
            text.style.opacity = '0';

            setTimeout(() => {
                wrapper.style.transform = 'translateY(-100vh)';
                text.style.display = 'none';
                container.classList.add('visible');
            }, 800);
        }

        window.onload = () => {
            soundIcon.src = 'img/靜音.png';
            volumeSlider.classList.remove('visible');
            
            setTimeout(() => {
                document.querySelectorAll('video').forEach(v => v.play().catch(() => {}));
            }, 500);
        };
    </script>
</body>
</html>
