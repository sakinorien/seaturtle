<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龜途</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
        .wrapper {
            position: relative;
            width: 100%;
            transition: transform 1s ease-in-out;
        }

        /* 共用背景影片/圖片樣式 */
        .bg-fill {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* 封面區塊 */
        .cover {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        .cover video {
            @extend .bg-fill;
        }
        
        .text {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            max-width: 300px;
            height: 60vw;
            max-height: 320px;
            background: url('img/字.png') no-repeat center;
            background-size: contain;
            cursor: pointer;
            animation: pulse 2.8s infinite ease-in-out;
            opacity: 0.92;
        }

        .text:hover {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.08);
            transition: all 0.35s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50%      { transform: translate(-50%, -50%) scale(1.04); }
        }

        /* 內容區塊 */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }
        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .container video {
            @extend .bg-fill;
        }

        .title-image1, .title-image2 {
            @extend .bg-fill;
            pointer-events: none;
        }

        .text1, .text2 {
            position: absolute;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            cursor: pointer;
        }
        .text1 {
            top: 50%;
            left: 40%;
            transform: translate(-50%, -50%);
            width: 60vw;
            max-width: 200px;
            height: 42vw;
            max-height: 550px;
            background-image: url('img/選擇/識龜.png');
        }
        .text2 {
            top: 85%;
            left: 55%;
            transform: translate(-50%, -50%);
            width: 70vw;
            max-width: 300px;
            height: 42vw;
            max-height: 550px;
            background-image: url('img/選擇/沉入深海.png');
        }

        /* 聲音控制區域 - 縮小版 */
        .sound-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .sound-toggle {
            width: 70px;
            height: 70px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        .sound-toggle:hover {
            background-color: rgba(0, 0, 0, 0.8);
            transform: scale(1.15);
        }
        .sound-toggle img {
            width: 70px;
            height: 70px;
        }

        .volume-slider {
            width: 120px;
            height: 220px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .volume-slider.visible {
            opacity: 1;
            visibility: visible;
        }
        .volume-slider input[type="range"] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 80px;
            height: 90%;
            background: transparent;
            cursor: pointer;
        }
        .volume-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
        }

        /* 響應式調整 */
        @media (max-width: 768px) {
            .text {
                width: 55vw;
                max-width: 280px;
                height: 55vw;
                max-height: 280px;
            }
            .text1 {
                width: 75vw;
                max-width: 500px;
                height: 45vw;
                max-height: 300px;
            }
            .text2 {
                width: 92vw;
                max-width: 720px;
                height: 58vw;
                max-height: 450px;
                top: 80%;
            }
        }

        @media (max-width: 480px) {
            .sound-control {
                bottom: 15px;
                right: 15px;
            }
            .sound-toggle {
                width: 60px;
                height: 60px;
            }
            .sound-toggle img {
                width: 60px;
                height: 60px;
            }
            .volume-slider {
                width: 100px;
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="cover" id="cover">
            <video autoplay muted loop playsinline class="bg-fill">
                <source src="video/bg.mp4" type="video/mp4">
            </video>
            <div class="text" onclick="scrollToSection('container')"></div>
        </div>

        <div class="container" id="container">
            <video autoplay muted loop playsinline class="bg-fill">
                <source src="video/選擇介面.mp4" type="video/mp4">
            </video>
            <img src="img/選擇/export202509071356493040.png" alt="" class="title-image1 bg-fill">
            <img src="img/選擇/export202509071356577320.png" alt="" class="title-image2 bg-fill">
            <div class="text1" onclick="window.location.href='turtle.html'"></div>
            <div class="text2" onclick="window.location.href='second copy.html'"></div>
        </div>

        <section id="section1"></section>
        <section id="section2"></section>
    </div>

    <!-- 背景音樂 -->
    <audio id="bgm" loop preload="auto">
        <source src="video/55piw-361ja.mp3" type="audio/mpeg">
    </audio>

    <!-- 聲音控制區域 -->
    <div class="sound-control">
        <div class="volume-slider" id="volumeSlider">
            <input type="range" id="volumeControl" min="0" max="100" value="70" step="1">
        </div>

        <div class="sound-toggle" onclick="toggleSound()">
            <img src="img/靜音.png" alt="聲音開關" id="sound-icon">
        </div>
    </div>

    <script>
        const bgm = document.getElementById('bgm');
        const soundIcon = document.getElementById('sound-icon');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeControl = document.getElementById('volumeControl');
        let isPlaying = false;

        bgm.volume = 0.7;

        function toggleSound() {
            if (isPlaying) {
                bgm.pause();
                soundIcon.src = 'img/靜音.png';
                volumeSlider.classList.remove('visible');
                isPlaying = false;
            } else {
                bgm.play().catch(e => console.log("自動播放被瀏覽器阻擋", e));
                soundIcon.src = 'img/聲音.png';
                volumeSlider.classList.add('visible');
                isPlaying = true;
            }
        }

        volumeControl.addEventListener('input', function() {
            bgm.volume = this.value / 100;
        });

        window.onload = function() {
            soundIcon.src = 'img/靜音.png';
            volumeSlider.classList.remove('visible');
        };

        function scrollToSection(sectionId) {
            const wrapper = document.querySelector('.wrapper');
            const targetElement = document.querySelector(`#${sectionId}`);
            if (targetElement) {
                const index = Array.from(wrapper.children).indexOf(targetElement);
                const offset = index * window.innerHeight;
                if (sectionId === 'container') {
                    const text = document.querySelector('.text');
                    text.style.transition = 'opacity 1s';
                    text.style.opacity = '0';
                    setTimeout(() => {
                        wrapper.style.transform = `translateY(-${offset}px)`;
                        text.style.display = 'none';
                        targetElement.classList.add('visible');
                    }, 1000);
                } else {
                    wrapper.style.transform = `translateY(-${offset}px)`;
                    targetElement.classList.add('visible');
                }
            }
        }
    </script>
</body>
</html>
