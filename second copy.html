<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>起源之旅</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            height:100vh;
            overflow:hidden;
            background:#000;
            position:relative;
            font-family: system-ui, sans-serif;
        }

        /* 影片層 */
        #video-wrapper{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:1;
        }
        .video{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
            object-fit:cover;
            opacity:0;
            transition:opacity .6s ease;
        }
        .video.active{opacity:1;}

        /* 互動層 */
        #overlay{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:10;
            opacity:0;
            transition:opacity .5s ease .3s;
            pointer-events:none;
        }
        #overlay.active{
            opacity:1;
            pointer-events:auto;
        }

        /* === 雙層圓點 === */
        .info-dot {
            position: relative;
            width: 45px; height: 45px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        .info-dot::before {
            content: '';
            position: absolute;
            inset: -8px;
            background: radial-gradient(circle, rgb(255, 255, 255) 50%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 1.6s infinite ease-in-out;
            pointer-events: none;
            z-index: -1;
        }
        .info-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            background: transparent;
            border: 4px solid rgba(255, 255, 255, 0.881);
            border-radius: 50%;
            animation: pulse 1.6s infinite ease-in-out;
            transition: all 0.3s ease;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50%      { transform: scale(1.35); opacity: 0.9; }
        }
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50%      { transform: scale(1.4); opacity: 0.7; }
        }

        /* 觸發後：實心白 + 永久靜止 */
        .info-dot.triggered::after {
            background: white !important;
            border-color: white !important;
            animation: none !important;
            transform: scale(1) !important;
            opacity: 1 !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.9);
        }
        .info-dot.triggered::before {
            animation: none !important;
            opacity: 0.8;
            transform: scale(1.1) !important;
        }
        .info-dot.triggered {
            pointer-events: none !important;
            cursor: default !important;
            opacity: 1 !important;
        }

        /* hover 放大（觸發前） */
        .info-dot:hover {
            animation: none !important;
            transform: scale(1.3) !important;
            opacity: 1;
            transition: transform 0.2s ease;
        }

        .dot-1{top:25%;left:15%;}
        .dot-2{top:80%;left:25%;}

        /* === 資訊卡 === */
        .info-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 2500px;
            height: 1200px;
            max-width: 95%;
            max-height: 90%;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 20;
        }

        .info-card.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .info-card .card-content {
            position: relative;
            background: white;
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            font-family: "Microsoft JhengHei", sans-serif;
            font-size: 50px;
            color: #333;
            line-height: 1.8;
            max-height: 90vh;
            overflow-y: auto;
        }

        .card-back-button {
            position: absolute;
            top: -20px;
            left: -400px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            z-index: 10001;
        }

        .card-back-button:hover {
            background: #e0e0e0;
            transform: scale(1.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .card-image {
            width: 100%;
            max-width: 1000px;
            border-radius: 20px;
            margin: 20px auto 25px auto;
            display: block;
        }

        .card-text {
            line-height: 1.8;
            margin: 0 30px;
        }
        .card-text p {
            margin-bottom: 25px;
        }

        #next{
            position:absolute;
            top:90%;
            left:50%;
            transform:translateX(-50%);
            cursor:pointer;
            z-index:11;
        }
        #next img{
            height:auto;
            width:auto;
            max-height:200px;
            object-fit:contain;
        }

        #back{
            position:absolute;
            top:5%;
            left:50%;
            transform:translateX(-50%);
            cursor:pointer;
            z-index:11;
        }
        #back img{
            height:auto;
            width:auto;
            max-height:200px;
            object-fit:contain;
        }

        .top-right-controls {
    position: absolute;
    top: 5%;
    right: 10%;
    display: flex;
    flex-direction: row-reverse;  /* 加這行就反轉順序 */
    align-items: center;
    gap: 30px;
    z-index: 13;
}

        /* 聲音按鈕 */
        #sound-icon {
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            transition: all .5s ease .5s;
        }
        #sound-icon.active {
            opacity: 1;
            transform: translateY(0);
        }
        #sound-icon:hover {
            transform: translateY(0) scale(1.25);
        }
        #sound-icon img {
            width: 55%;
            filter: brightness(1) drop-shadow(0 0 8px rgba(255,255,255,.5));
            transition: all .3s ease;
        }
        #sound-icon:hover img {
            filter: brightness(1.3) drop-shadow(0 0 20px rgba(255,255,255,.9));
        }

        /* 三條槓選單按鈕 */
        #menu-icon{
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            transition: all .5s ease .5s;
        }
        #menu-icon.active{
            opacity: 1;
            transform: translateY(0);
        }
        #menu-icon:hover{
            transform: translateY(0) scale(1.25);
        }
        #menu-icon img{
            width: 55%;
            filter: brightness(1) drop-shadow(0 0 8px rgba(255,255,255,.5));
            transition: all .3s ease;
        }
        #menu-icon:hover img{
            filter: brightness(1.3) drop-shadow(0 0 20px rgba(255,255,255,.9));
        }

        /* === 音量拉桿（點擊聲音按鈕時出現） === */
        #volume-control {
            position: absolute;
            top: 480px;
            right: 10%;
            width: 400px;
            height: 600px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 12;
        }
        #volume-control.visible {
            opacity: 1;
            visibility: visible;
        }
        #volume-control input[type="range"] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 500px;
            height: 80%;
            background: transparent;
            cursor: pointer;
        }
        #volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        /* === 終極滾輪選單 === */
        #wheel-modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.85);
            backdrop-filter:blur(15px);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:20;
            opacity:0;
            visibility:hidden;
            transition:opacity .6s ease, visibility .6s;
            pointer-events:none;
        }
        #wheel-modal.active{
            opacity:1;
            visibility:visible;
            pointer-events:auto;
        }
        #wheel-modal .wheel-container{
            width:90%;
            max-width:1200px;
            height:80vh;
            max-height:900px;
            background:rgba(255,255,255,.08);
            border-radius:28px;
            overflow:hidden;
            box-shadow:0 20px 80px rgba(0,0,0,.8);
            position:relative;
        }
        .wheel-container::before{
            content:'';position:absolute;top:0;left:0;right:0;height:280px;
            background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
            pointer-events:none;z-index:10;
        }
        .wheel-container::after{
            content:'';position:absolute;bottom:0;left:0;right:0;height:280px;
            background:linear-gradient(to top, rgba(0,0,0,.9), transparent);
            pointer-events:none;z-index:10;
        }

        #wheel-modal .wheel{
            position:absolute;top:0;width:100%;
            transition:transform .45s cubic-bezier(0.23,1,0.32,1);
        }
        #wheel-modal .wheel-item{
            height:200px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:72px;
            color:white;
            font-weight:800;
            letter-spacing:4px;
            text-shadow:0 4px 20px rgba(0,0,0,.8);
            cursor:pointer;
            position:relative;
            z-index:1;
            filter:blur(2.5px);
            opacity:0.55;
            transform:scale(0.86);
            transition:all .45s cubic-bezier(0.23,1,0.32,1);
        }
        .wheel-item.near{
            filter:blur(0.8px);
            opacity:0.88;
            transform:scale(0.95);
        }
        .wheel-item.active{
            filter:blur(0)!important;
            opacity:1!important;
            transform:scale(1.12)!important;
            background:linear-gradient(135deg, rgba(255,255,255,.38), rgba(255,255,255,.18));
            text-shadow:0 0 35px rgba(255,255,255,.95);
            box-shadow:0 0 70px rgba(255,255,255,.6);
            z-index:20;
        }

        #wheel-modal .highlight{
            position:absolute;
            top:calc(50% - 90px);
            width:100%;
            height:180px;
            background:linear-gradient(180deg, transparent 0%, rgba(255,255,255,.25) 50%, transparent 100%);
            border-top:2px solid rgba(255,255,255,.5);
            border-bottom:2px solid rgba(255,255,255,.5);
            pointer-events:none;
            z-index:5;
        }
        #close-wheel{
            position:absolute;
            top:20px;
            right:20px;
            width:60px;height:60px;
            background:rgba(255,255,255,.2);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:42px;
            color:white;
            backdrop-filter:blur(10px);
            cursor:pointer;
            z-index:30;
            transition:all .3s;
        }
        #close-wheel:hover{
            background:rgba(255,0,0,.6);
            transform:rotate(90deg);
        }
    </style>
</head>
<body>

    <!-- 影片層 -->
    <div id="video-wrapper">
        <video id="video1" class="video active" autoplay muted preload="auto">
            <source src="video/網頁完整影片/起源.mp4" type="video/mp4">
        </video>
        <video id="video2" class="video" autoplay muted loop preload="auto">
            <source src="video/網頁完整影片/起源-循環.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 互動層 -->
    <div id="overlay">
        <div class="info-dot dot-1" id="dot1"></div>
        <div class="info-dot dot-2" id="dot2"></div>

        <!-- 資訊框1 & 2 -->
        <div id="info1" class="info-card">
            <div class="card-back-button">←</div>
            <div class="card-content">
                <img src="img/垃圾污染產卵地.jpg" alt="" class="card-image">
                <div class="card-text">
                    <p>人類活動產生的垃圾會污染綠蠵龜的產卵地，破壞其棲息環境，影響母龜產卵和幼龜出生後的活動，增加其死亡風險。</p>
                </div>
            </div>
        </div>

        <div id="info2" class="info-card">
            <div class="card-back-button">←</div>
            <div class="card-content">
                <img src="img/爬痕.jpg" alt="" class="card-image">
                <div class="card-text">
                    <p>此為綠蠵龜的爬痕，其記錄有助於了解綠蠵龜的分布、族群活動以及產卵行為。</p>
                    <p>當保育人員發現綠蠵龜爬痕時，會以警示帶標記疑似的卵窩，以避免卵窩被破壞，確保小海龜的孵化。</p>
                </div>
            </div>
        </div>

        <div id="next">
            <img src="img/Icon-下一頁.png" alt="下一頁">
        </div>

        <div id="back">
            <img src="img/Icon-上一頁.png" alt="上一頁">
        </div>

        <!-- 右上角控制區：聲音按鈕 + 三條槓 -->
        <div class="top-right-controls">
            <div id="sound-icon">
                <img src="img/靜音.png" alt="聲音開關" id="sound-img">
            </div>
            <div id="menu-icon">
                <img src="img/Icon-三條槓.png" alt="選單">
            </div>
        </div>

        <!-- 音量拉桿 -->
        <div id="volume-control">
            <input type="range" id="volume-slider" min="0" max="100" value="60" step="1">
        </div>

        <!-- 滾輪彈出層 -->
        <div id="wheel-modal">
            <div class="wheel-container">
                <div class="highlight"></div>
                <div class="wheel" id="wheel"></div>
            </div>
            
        </div>

        <audio id="bgm" preload="auto" loop>
            <source src="video/【白噪音】海浪聲 幫助入睡 睡眠放鬆 減輕焦慮感 專注力增加 學習集中 作業用、休息用 _ ASMR _ Soothing Music, Sea Waves [Wxs5e7RUW6k].mp3" type="audio/mp3">
        </audio>
    </div>

    <script>
        // === 背景音樂直接自動播放 ===
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.6;
        bgm.play().catch(() => {
            // 如果自動播放被瀏覽器阻擋，也不會出錯
        });

        // === 影片切換 ===
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        const overlay = document.getElementById('overlay');

        v1.addEventListener('ended', () => {
            v1.classList.remove('active');
            v2.classList.add('active');
            overlay.classList.add('active');
            setTimeout(() => {
                document.getElementById('next').classList.add('active');
                document.getElementById('back').classList.add('active');
                document.getElementById('sound-icon').classList.add('active');
                document.getElementById('menu-icon').classList.add('active');
            }, 300);
        });

        // === 聲音按鈕與音量控制 ===
        const soundIcon = document.getElementById('sound-icon');
        const soundImg = document.getElementById('sound-img');
        const volumeControl = document.getElementById('volume-control');
        const volumeSlider = document.getElementById('volume-slider');
        let isPlaying = true; // 初始為播放狀態

        soundIcon.addEventListener('click', () => {
            if (isPlaying) {
                bgm.pause();
                soundImg.src = 'img/靜音.png';
                volumeControl.classList.remove('visible');
                isPlaying = false;
            } else {
                bgm.play();
                soundImg.src = 'img/聲音.png';
                volumeControl.classList.add('visible');
                isPlaying = true;
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            bgm.volume = e.target.value / 100;
        });

        // 初始狀態：顯示有聲圖示 + 拉桿隱藏
        window.addEventListener('load', () => {
            soundImg.src = 'img/聲音.png';
        });

        // === 圓點與資訊框 ===
        document.getElementById('dot1').addEventListener('click', function() {
            const card = document.getElementById('info1');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                this.classList.add('triggered');
            }
        });

        document.getElementById('dot2').addEventListener('click', function() {
            const card = document.getElementById('info2');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                this.classList.add('triggered');
            }
        });

        document.querySelectorAll('.info-card').forEach(card => {
            card.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                    const dotId = this.id === 'info1' ? 'dot1' : 'dot2';
                    const dot = document.getElementById(dotId);
                    if (dot) dot.classList.remove('triggered');
                }
            });
        });

        document.querySelectorAll('.card-back-button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const card = this.closest('.info-card');
                card.classList.remove('show');
                const dotId = card.id === 'info1' ? 'dot1' : 'dot2';
                const dot = document.getElementById(dotId);
                if (dot) dot.classList.remove('triggered');
            });
        });

        // === 下一頁 / 上一頁 ===
        document.getElementById('next').addEventListener('click', () => { 
            window.location.href = 'third.html'; 
        });

        document.getElementById('back').addEventListener('click', () => { 
            window.location.href = 'test5 copy.html'; 
        });

        // === 滾輪選單 ===
        const menuIcon = document.getElementById('menu-icon');
        const wheelModal = document.getElementById('wheel-modal');
        const wheel = document.getElementById('wheel');
        

        const itemHeight = 200;
        let containerHeight = 0;
        let highlightOffset = 0;
        let currentIndex = 1;

        const chapters = [
            { text: '龜途', page: 'test5 copy.html' },
            { text: '起源', page: 'second copy.html' },
            { text: '破殼', page: 'third 1.html' },
            { text: '天擇', page: 'forth copy.html' },
             { text: '悲鳴', page: 'fifth.html' }
        ];

        function calculateHighlight() {
            const container = wheelModal.querySelector('.wheel-container');
            containerHeight = container.clientHeight;
            highlightOffset = containerHeight / 2 - itemHeight / 2;
        }

        function renderWheel() {
            wheel.innerHTML = '';
            chapters.forEach((chap, i) => {
                const div = document.createElement('div');
                div.className = 'wheel-item';
                div.textContent = chap.text;
                div.addEventListener('click', () => {
                    currentIndex = i;
                    updateWheel();
                    document.body.style.opacity = '0';
                    setTimeout(() => location.href = chap.page, 600);
                });
                wheel.appendChild(div);
            });
            calculateHighlight();
            updateWheel();
        }

        function updateWheel() {
            const offset = highlightOffset - currentIndex * itemHeight;
            wheel.style.transform = `translateY(${offset}px)`;

            document.querySelectorAll('.wheel-item').forEach((el, i) => {
                const distance = Math.abs(i - currentIndex);
                el.classList.remove('active', 'near');
                if (distance === 0) el.classList.add('active');
                else if (distance === 1) el.classList.add('near');
            });
        }

        menuIcon.addEventListener('click', () => {
            wheelModal.classList.add('active');
            setTimeout(renderWheel, 100);
        });

      
        wheelModal.addEventListener('click', e => { 
            if (e.target === wheelModal) wheelModal.classList.remove('active'); 
        });

        wheelModal.addEventListener('wheel', e => { 
            e.preventDefault(); 
            currentIndex += e.deltaY > 0 ? 1 : -1; 
            currentIndex = Math.max(0, Math.min(currentIndex, chapters.length - 1)); 
            updateWheel(); 
        }, { passive: false });

        let dragging = false, startY, startIdx;
        wheelModal.addEventListener('mousedown', e => { 
            if (e.target.classList.contains('wheel-item')) { 
                dragging = true; startY = e.clientY; startIdx = currentIndex; 
            } 
        });
        document.addEventListener('mousemove', e => { 
            if (dragging) { 
                const delta = e.clientY - startY; 
                currentIndex = Math.max(0, Math.min(startIdx - Math.round(delta / itemHeight), chapters.length - 1)); 
                updateWheel(); 
            } 
        });
        document.addEventListener('mouseup', () => dragging = false);

        window.addEventListener('resize', () => {
            if (wheelModal.classList.contains('active')) { 
                calculateHighlight(); 
                updateWheel(); 
            }
        });
    </script>
</body>
</html>
