<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>起源之旅</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            height:100vh;
            overflow:hidden;
            background:#000;
            position:relative;
            font-family: system-ui, sans-serif;
        }

        /* 影片層 */
        #video-wrapper{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:1;
        }
        .video{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
            object-fit:cover;
            opacity:0;
            transition:opacity .6s ease;
        }
        .video.active{opacity:1;}

        /* 互動層 */
        #overlay{
            position:absolute;
            inset:0;
            width:100%;
            height:100vh;
            z-index:10;
            opacity:0;
            transition:opacity .5s ease .3s;
            pointer-events:none;
        }
        #overlay.active{
            opacity:1;
            pointer-events:auto;
        }

        /* === 雙層圓點 - 縮小 === */
        .info-dot {
            position: relative;
            width: 28px; 
            height: 28px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        .info-dot::before {
            content: '';
            position: absolute;
            inset: -6px;
            background: radial-gradient(circle, rgb(255, 255, 255) 50%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 1.8s infinite ease-in-out;
            pointer-events: none;
            z-index: -1;
        }
        .info-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            background: transparent;
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            animation: pulse 1.8s infinite ease-in-out;
            transition: all 0.3s ease;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.65; }
            50%      { transform: scale(1.4); opacity: 0.95; }
        }
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.45; }
            50%      { transform: scale(1.45); opacity: 0.75; }
        }

        .info-dot.triggered::after {
            background: white !important;
            border-color: white !important;
            animation: none !important;
            transform: scale(1) !important;
            opacity: 1 !important;
            box-shadow: 0 0 16px rgba(255,255,255,0.85);
        }
        .info-dot.triggered::before {
            animation: none !important;
            opacity: 0.85;
            transform: scale(1.08) !important;
        }
        .info-dot.triggered {
            pointer-events: none !important;
            cursor: default !important;
            opacity: 1 !important;
        }

        .info-dot:hover {
            transform: scale(1.4) !important;
            opacity: 1;
        }

        .dot-1{top:25%;left:12%;}
        .dot-2{top:78%;left:22%;}

        /* === 資訊卡 - 移除滾輪，讓高度自動適應 === */
       
.info-card {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    width: 90%;
    max-width: 900px;              /* 加寬一點，左右並排更舒適 */
    max-height: 400px;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    z-index: 20;
    overflow: visible;
}

.info-card.show {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
}

.info-card .card-content {
    position: relative;
    background:rgba(180, 190, 200, 0.85);
    padding: 30px;
    border-radius: 24px;
    display: flex;                 /* 左右並排 */
    flex-direction: row;
    gap: 30px;
    align-items: flex-start;
    height: auto;
}

/* 左側圖片區 */
.card-image-container {
    flex: 0 0 45%;                 /* 圖片佔比，可調 40%~50% */
    max-width: 400px;
}

.card-image {
    width: 100%;
    border-radius: 16px;
    display: block;
}

/* 右側文字區 */
.card-text-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.card-title {
    font-size: 32px;
    font-weight: bold;
    color: #222;
    margin-bottom: 20px;
    text-align: center;            /* 或改成 left 左對齊 */
    line-height: 1.3;
}

.card-text {
    line-height: 1.7;
    font-size: 1.05em;
    color: #333;
}

.card-text p {
    margin-bottom: 18px;
}

/* 返回鍵 - 保持起源頁原樣，不改動 */
.card-back-button {
    position: absolute;
    top: -15px;                    /* 你的起源頁原設定 */
    left: -15px;                   /* 你的起源頁原設定 */
    width: 60px;
    height: 60px;
    background: rgba(180, 190, 200, 0.85);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    color: #333;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(0,0,0,0.3);
    transition: all 0.25s ease;
    z-index: 30;
}

.card-back-button:hover {
    background:rgba(180, 180, 180, 0.95);
    transform: scale(1.2);
}



        .card-back-button {
            position: absolute;
            top: 0px;
            left: -60px;
            width: 60px;
            height: 60px;
            background: rgba(220, 220, 220, 0.95);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: #333;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            transition: all 0.25s ease;
            z-index: 30;
        }

        .card-back-button:hover {
            background: #e0e0e0;
            transform: scale(1.2);
        }

        .card-image {
            width: 100%;
            max-width: 300px;
            border-radius: 16px;
            margin: 15px auto;
            display: block;
        }

        .card-text {
            line-height: 1.7;
            margin: 0 15px;
            font-size: 1.05em;
        }
        .card-text p {
            margin-bottom: 18px;
        }

        /* 下一頁 / 上一頁 - 縮小 */
        #next, #back {
            position:absolute;
            cursor:pointer;
            z-index:11;
        }
        #next {
            bottom: 4%;
            left:50%;
            transform:translateX(-50%);
        }
        #back {
            top: 3%;
            left:50%;
            transform:translateX(-50%);
        }
        #next img, #back img {
            height: auto;
            width: auto;
            max-height: 40px;           /* 原 200px → 90px */
            object-fit: contain;
        }

       /* 右上控制區 → 只當作一個空的參考容器，或乾脆移除它 */
.top-right-controls {
    position: absolute;
    top: 3%;
    right: 3%;
    z-index: 13;
    /* 移除 display: flex 和其他排列屬性，因為我們不用它排版了 */
}

/* 聲音圖示 - 獨立定位 */
#sound-icon {
    position: absolute;
    top: 0;                    /* 貼近頂部，可調 */
    right: 0;                  /* 貼近右邊，可調 */
    width: 64px;
    height: 64px;
    opacity: 0;
    transform: translateY(20px);
    transition: all .5s ease .5s;
    cursor: pointer;
}

#sound-icon.active {
    opacity: 1;
    transform: translateY(0);
}

#sound-icon:hover {
    transform: translateY(0) scale(1.18);
}

/* 三條槓 - 獨立定位，往下移 */
#menu-icon {
    position: absolute;
    top: 7px;                 /* ← 這裡控制往下移多少，從頂部算起，建議 60~120px 之間調整 */
    right: 80px;                  /* 與聲音圖示對齊右邊，可改 right: 10px; 拉開一點 */
    width: 64px;
    height: 64px;
    opacity: 0;
    transform: translateY(20px);
    transition: all .5s ease .6s;  /* 延遲一點出現，比較有層次，可調 */
    cursor: pointer;
}

#menu-icon.active {
    opacity: 1;
    transform: translateY(0);
}

#menu-icon:hover {
    transform: translateY(0) scale(1.18);
}

/* 圖示內 img 樣式（不變） */
#sound-icon img, #menu-icon img {
    width: 80%;
    filter: brightness(1) drop-shadow(0 0 6px rgba(255,255,255,.6));
    transition: all .25s ease;
}

#sound-icon:hover img, #menu-icon:hover img {
    filter: brightness(1.4) drop-shadow(0 0 14px rgba(255,255,255,.9));
}

/* 音量拉桿 */
        #volume-control {
            position: absolute;
            top: 18%;
            right: 4%;
            width: 80px;
            height: 320px;
            background: rgba(255,255,255,0.12);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 12;
        }
        #volume-control.visible {
            opacity: 1;
            visibility: visible;
        }
        #volume-control input[type="range"] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 16px;
            height: 85%;
            background: transparent;
            cursor: pointer;
        }
        #volume-control input[type="range"]::-webkit-slider-thumb {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255,255,255,0.7);
        }
        /* === 終極滾輪選單 - 等比例縮小版 === */
#wheel-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    backdrop-filter:blur(15px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:20;
    opacity:0;
    visibility:hidden;
    transition:opacity .6s ease, visibility .6s;
    pointer-events:none;
}

#wheel-modal.active{
    opacity:1;
    visibility:visible;
    pointer-events:auto;
}

#wheel-modal .wheel-container{
    width: 88%;                    /* 原90% → 稍收 */
    max-width: 820px;              /* 原1200px → 等比縮小 */
    height: 72vh;                  /* 原80vh → 留空間 */
    max-height: 620px;             /* 原900px → 等比 */
    background:rgba(255,255,255,.08);
    border-radius:20px;            /* 稍圓潤 */
    overflow:hidden;
    box-shadow:0 16px 60px rgba(0,0,0,.75);
    position:relative;
}

.wheel-container::before{
    content:'';position:absolute;top:0;left:0;right:0;height:180px;  /* 原280px → 縮小 */
    background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
    pointer-events:none;z-index:10;
}

.wheel-container::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:180px; /* 原280px → 縮小 */
    background:linear-gradient(to top, rgba(0,0,0,.9), transparent);
    pointer-events:none;z-index:10;
}

#wheel-modal .wheel{
    position:absolute;top:0;width:100%;
    transition:transform .45s cubic-bezier(0.23,1,0.32,1);
}

#wheel-modal .wheel-item{
    height:130px;                  /* 原200px → 等比縮小 */
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:48px;                /* 原72px → 等比 */
    color:white;
    font-weight:800;
    letter-spacing:3px;            /* 稍收 */
    text-shadow:0 3px 16px rgba(0,0,0,.8);
    cursor:pointer;
    position:relative;
    z-index:1;
    filter:blur(2px);
    opacity:0.6;
    transform:scale(0.88);
    transition:all .45s cubic-bezier(0.23,1,0.32,1);
}

.wheel-item.near{
    filter:blur(0.8px);
    opacity:0.88;
    transform:scale(0.96);
}

.wheel-item.active{
    filter:blur(0)!important;
    opacity:1!important;
    transform:scale(1.09)!important;  /* 原1.12 → 縮小後不要太誇張 */
    background:linear-gradient(135deg, rgba(255,255,255,.38), rgba(255,255,255,.18));
    text-shadow:0 0 30px rgba(255,255,255,.9);
    box-shadow:0 0 60px rgba(255,255,255,.55);
    z-index:20;
}

#wheel-modal .highlight{
    position:absolute;
    top:calc(50% - 65px);          /* 配合 height:130px 調整 */
    width:100%;
    height:130px;                  /* 原180px → 等比 */
    background:linear-gradient(180deg, transparent 0%, rgba(255,255,255,.25) 50%, transparent 100%);
    border-top:2px solid rgba(255,255,255,.5);
    border-bottom:2px solid rgba(255,255,255,.5);
    pointer-events:none;
    z-index:5;
}

#close-wheel{
    position:absolute;
    top:16px;
    right:16px;
    width:52px;height:52px;
    background:rgba(255,255,255,.2);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    color:white;
    backdrop-filter:blur(10px);
    cursor:pointer;
    z-index:30;
    transition:all .3s;
}

#close-wheel:hover{
    background:rgba(255,0,0,.6);
    transform:rotate(90deg);
}
    </style>
</head>
<body>

    <!-- 影片層 -->
    <div id="video-wrapper">
        <video id="video1" class="video active" autoplay muted preload="auto">
            <source src="video/網頁完整影片/起源.mp4" type="video/mp4">
        </video>
        <video id="video2" class="video" autoplay muted loop preload="auto">
            <source src="video/網頁完整影片/起源-循環.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 互動層 -->
    <div id="overlay">
        <div class="info-dot dot-1" id="dot1"></div>
        <div class="info-dot dot-2" id="dot2"></div>

       <!-- 資訊框1 -->
<div id="info1" class="info-card">
    <div class="card-back-button">←</div>
    <div class="card-content">
        <div class="card-image-container">
            <img src="img/垃圾污染產卵地.jpg" alt="" class="card-image">
        </div>
        <div class="card-text-container">
            <h2 class="card-title">垃圾污染產卵地</h2>
            <div class="card-text">
                <p>人類活動產生的垃圾會污染綠蠵龜的產卵地，破壞其棲息環境，影響母龜產卵和幼龜出生後的活動，增加其死亡風險。</p>
            </div>
        </div>
    </div>
</div>

<!-- 資訊框2 -->
<div id="info2" class="info-card">
    <div class="card-back-button">←</div>
    <div class="card-content">
        <div class="card-image-container">
            <img src="img/爬痕.jpg" alt="" class="card-image">
        </div>
        <div class="card-text-container">
            <h2 class="card-title">綠蠵龜爬痕記錄</h2>
            <div class="card-text">
                <p>此為綠蠵龜的爬痕，其記錄有助於了解綠蠵龜的分布、族群活動以及產卵行為。</p>
                <p>當保育人員發現綠蠵龜爬痕時，會以警示帶標記疑似的卵窩，以避免卵窩被破壞，確保小海龜的孵化。</p>
            </div>
        </div>
    </div>
</div>

        <div id="next">
            <img src="img/Icon-下一頁.png" alt="下一頁">
        </div>

        <div id="back">
            <img src="img/Icon-上一頁.png" alt="上一頁">
        </div>

        <!-- 右上角控制區 -->
        <div class="top-right-controls">
            <div id="sound-icon">
                <img src="img/靜音.png" alt="聲音開關" id="sound-img">
            </div>
            <div id="menu-icon">
                <img src="img/Icon-三條槓.png" alt="選單">
            </div>
        </div>

        <!-- 音量拉桿 -->
        <div id="volume-control">
            <input type="range" id="volume-slider" min="0" max="100" value="60" step="1">
        </div>

        <!-- 滾輪彈出層 -->
        <div id="wheel-modal">
            <div class="wheel-container">
                <div class="highlight"></div>
                <div class="wheel" id="wheel"></div>
            </div>
        </div>

        <audio id="bgm" preload="auto" loop>
            <source src="video/seawaves-bgm.mp4" type="audio/mp3">
        </audio>
    </div>

    <script>
         // 背景音樂
        const bgm = document.getElementById('bgm');
        const soundIcon = document.getElementById('sound-icon');
        const soundImg = document.getElementById('sound-img');
        const volumeControl = document.getElementById('volume-control');
        const volumeSlider = document.getElementById('volume-slider');
        let isPlaying = true;

        bgm.volume = 0.6;
        bgm.play().catch(() => {
            isPlaying = false;
        });

        window.addEventListener('load', () => {
            soundImg.src = 'img/聲音.png';
        });

        soundIcon.addEventListener('click', () => {
            if (isPlaying) {
                bgm.pause();
                soundImg.src = 'img/靜音.png';
                volumeControl.classList.remove('visible');
                isPlaying = false;
            } else {
                bgm.play().catch(() => {});
                soundImg.src = 'img/聲音.png';
                volumeControl.classList.add('visible');
                isPlaying = true;
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            bgm.volume = e.target.value / 100;
        });

        document.body.addEventListener('click', () => {
            if (!isPlaying) {
                bgm.play().catch(() => {});
                soundImg.src = 'img/聲音.png';
                isPlaying = true;
            }
        }, { once: true });


        // === 影片切換 ===
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        const overlay = document.getElementById('overlay');

        v1.addEventListener('ended', () => {
            v1.classList.remove('active');
            v2.classList.add('active');
            overlay.classList.add('active');
            setTimeout(() => {
                document.getElementById('next').classList.add('active');
                document.getElementById('back').classList.add('active');
                document.getElementById('sound-icon').classList.add('active');
                document.getElementById('menu-icon').classList.add('active');
            }, 300);
        });

        // === 圓點與資訊框 ===
        document.getElementById('dot1').addEventListener('click', function() {
            const card = document.getElementById('info1');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                this.classList.add('triggered');
            }
        });

        document.getElementById('dot2').addEventListener('click', function() {
            const card = document.getElementById('info2');
            if (!card.classList.contains('show')) {
                card.classList.add('show');
                this.classList.add('triggered');
            }
        });

        document.querySelectorAll('.info-card').forEach(card => {
            card.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                    const dotId = this.id === 'info1' ? 'dot1' : 'dot2';
                    const dot = document.getElementById(dotId);
                    if (dot) dot.classList.remove('triggered');
                }
            });
        });

        document.querySelectorAll('.card-back-button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const card = this.closest('.info-card');
                card.classList.remove('show');
                const dotId = card.id === 'info1' ? 'dot1' : 'dot2';
                const dot = document.getElementById(dotId);
                if (dot) dot.classList.remove('triggered');
            });
        });

        // === 下一頁 / 上一頁 ===
        document.getElementById('next').addEventListener('click', () => { 
            window.location.href = 'third.html'; 
        });

        document.getElementById('back').addEventListener('click', () => { 
            window.location.href = 'test5 copy.html'; 
        });

        // === 滾輪選單 ===
        const menuIcon = document.getElementById('menu-icon');
        const wheelModal = document.getElementById('wheel-modal');
        const wheel = document.getElementById('wheel');
        

        const itemHeight = 130;
        let containerHeight = 0;
        let highlightOffset = 0;
        let currentIndex = 1;

        const chapters = [
            { text: '龜途', page: 'index.html' },
            { text: '起源', page: 'second copy.html' },
            { text: '破殼', page: 'third 1.html' },
            { text: '天擇', page: 'forth copy.html' },
             { text: '悲鳴', page: 'fifth.html' }
        ];

        function calculateHighlight() {
            const container = wheelModal.querySelector('.wheel-container');
            containerHeight = container.clientHeight;
            highlightOffset = containerHeight / 2 - itemHeight / 2;
        }

        function renderWheel() {
            wheel.innerHTML = '';
            chapters.forEach((chap, i) => {
                const div = document.createElement('div');
                div.className = 'wheel-item';
                div.textContent = chap.text;
                div.addEventListener('click', () => {
                    currentIndex = i;
                    updateWheel();
                    document.body.style.opacity = '0';
                    setTimeout(() => location.href = chap.page, 600);
                });
                wheel.appendChild(div);
            });
            calculateHighlight();
            updateWheel();
        }

        function updateWheel() {
            const offset = highlightOffset - currentIndex * itemHeight;
            wheel.style.transform = `translateY(${offset}px)`;

            document.querySelectorAll('.wheel-item').forEach((el, i) => {
                const distance = Math.abs(i - currentIndex);
                el.classList.remove('active', 'near');
                if (distance === 0) el.classList.add('active');
                else if (distance === 1) el.classList.add('near');
            });
        }

        menuIcon.addEventListener('click', () => {
            wheelModal.classList.add('active');
            setTimeout(renderWheel, 100);
        });

      
        wheelModal.addEventListener('click', e => { 
            if (e.target === wheelModal) wheelModal.classList.remove('active'); 
        });

        wheelModal.addEventListener('wheel', e => { 
            e.preventDefault(); 
            currentIndex += e.deltaY > 0 ? 1 : -1; 
            currentIndex = Math.max(0, Math.min(currentIndex, chapters.length - 1)); 
            updateWheel(); 
        }, { passive: false });

        let dragging = false, startY, startIdx;
        wheelModal.addEventListener('mousedown', e => { 
            if (e.target.classList.contains('wheel-item')) { 
                dragging = true; startY = e.clientY; startIdx = currentIndex; 
            } 
        });
        document.addEventListener('mousemove', e => { 
            if (dragging) { 
                const delta = e.clientY - startY; 
                currentIndex = Math.max(0, Math.min(startIdx - Math.round(delta / itemHeight), chapters.length - 1)); 
                updateWheel(); 
            } 
        });
        document.addEventListener('mouseup', () => dragging = false);

        window.addEventListener('resize', () => {
            if (wheelModal.classList.contains('active')) { 
                calculateHighlight(); 
                updateWheel(); 
            }
        });
    </script>
</body>
</html>
